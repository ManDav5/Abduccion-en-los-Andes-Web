<!-- SIGNIN / HERO -->

    <div class="container-fluid secondary-hero">
        <header class="row">

                <h1>SIGN IN</h1>
            </div>
        </header>
    </div>

<!-- SIGNIN / SECCTION 1 / SIGNIN -->

    <div class="MD-form-box d-flex justify-content-center and align-items-center mt-4 p-4 p-sm-3">
        <div class="row">
            <div class="col-12 container text-center">
                <h2>CREA UNA CUENTA</h2>
            </div>
            <div class="col-12">
                <form class="p-4 p-sm-3" action="">
                    <div class="mb-3">
                        <label for="MD-usuario" class="form-label">Usuario</label>
                        <input type="email" class="form-control" id="MD-usuario" aria-describedby="userHelp">
                        <div id="userHelp" class="form-text">Elige un nombre de Usuario.</div>
                    </div>
                    <div class="mb-3">
                        <label for="MD-correoelectronico" class="form-label">Email</label>
                        <input type="email" class="form-control" id="MD-correoelectronico" aria-describedby="emailHelp">
                        <div id="emailHelp" class="form-text">Nunca compartiremos tu dirección de Correo.</div>
                    </div>
                    <div class="mb-3">
                        <label for="MD-password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="MD-password">
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="MD-recuerdame">
                        <label class="form-check-label" for="MD-recuerdame">Recuerdame</label>
                    </div>
                    <div class="row ms-4 me-4 d-flex justify-content-center">
                        <button type="submit" class="col-6 btn MD-btn-primary btn-primary mb-2">Regístrate</button>
                        <button type="submit" class="col-12 btn MD-btn-link btn-link">
                            <a class="MD-btn-link" href="login.html">Ingresa</a>
                        </button>
                    </div>
                </form>
            </div>
            <div class="col-12">
                <p class="MD-footer-texto1 container text-center">o regístrate con</p>
            </div>
            <div class="col-12 d-flex justify-content-evenly mt-4 mb-4">
                <div>
                    <a class="nav-link MD-login-socialmedia" href="#"><i class="bi bi-twitter"></i></a>
                </div>
                <div>
                    <a class="nav-link MD-login-socialmedia" href="#"><i class="bi bi-google"></i></a>
                </div>
                <div>
                    <a class="nav-link MD-login-socialmedia" href="#"><i class="bi bi-facebook"></i></a>
                </div>
            </div>
        </div>
